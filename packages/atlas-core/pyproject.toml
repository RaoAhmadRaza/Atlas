[project]
name = "atlas-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.29",
  "pgvector>=0.3.6",
  "alembic>=1.13",
  "pydantic>=2.6",
  "redis[asyncio]>=5.0",
  "structlog>=24.0",
  "atlas-schemas",
  "langchain-text-splitters>=0.2",
  "tiktoken>=0.7",
  "pymupdf>=1.24",
  "python-docx>=1.1",
  "trafilatura>=1.9",
  "aioboto3>=13.0",
]

[tool.uv.sources]
atlas-schemas = { workspace = true }
