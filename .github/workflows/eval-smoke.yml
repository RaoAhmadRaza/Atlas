name: eval-smoke

on:
  pull_request:
    paths:
      - 'apps/eval-runner/**'
      - 'evals/**'
      - 'packages/atlas-core/**'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --all-packages
      - name: Run smoke eval
        env:
          EVAL_RETRIEVER_SOURCE: fake_seeded
          EVAL_FAITHFULNESS_JUDGE: noop
        run: |
          uv run atlas-eval run \
            --config evals/configs/hybrid_bge.yaml \
            --dataset evals/datasets/smoke_50.jsonl \
            --out evals/reports/
      - name: Assert recall gate
        run: |
          uv run python -c "
          import json
          r = json.load(open('evals/reports/latest.json'))
          assert r['recall_at_5'] >= 0.60, f'recall@5={r[\"recall_at_5\"]} < 0.60'
          print(f'recall@5={r[\"recall_at_5\"]:.3f} OK')
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: evals/reports/
