name: eval-nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --all-packages
      - name: Run nightly eval
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_NIGHTLY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_RETRIEVER_SOURCE: live
          EVAL_FAITHFULNESS_JUDGE: noop
        run: |
          uv run atlas-eval run \
            --config evals/configs/hybrid_bge.yaml \
            --dataset evals/datasets/smoke_50.jsonl \
            --out evals/reports/
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ github.run_id }}
          path: evals/reports/
